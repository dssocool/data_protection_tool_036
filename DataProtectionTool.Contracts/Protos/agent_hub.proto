syntax = "proto3";

option csharp_namespace = "DataProtectionTool.Contracts";

package dataprotection;

message RegisterRequest {
  string agent_id = 1;
  string oid = 2;
  string tid = 3;
  string user_name = 4;
}

message RegisterResponse {
  bool success = 1;
  string path = 2;
  string error = 3;
  string connections_json = 4;
}

message HeartbeatRequest {
  string path = 1;
}

message HeartbeatResponse {
  bool success = 1;
}

message SendCommandResultRequest {
  string path = 1;
  string type = 2;
  string payload = 3;
}

message SendCommandResultResponse {
  bool success = 1;
}

message GetConnectionDetailsRequest {
  string path = 1;
  string row_key = 2;
}

message GetConnectionDetailsResponse {
  bool success = 1;
  string row_key = 2;
  string server_name = 3;
  string authentication = 4;
  string user_name = 5;
  string password = 6;
  string database_name = 7;
  string encrypt = 8;
  bool trust_server_certificate = 9;
  string error = 10;
}

message GetSasTokenRequest {
  string path = 1;
  string container_name = 2;
}

message GetSasTokenResponse {
  bool success = 1;
  string sas_token = 2;
  string blob_endpoint = 3;
  string container = 4;
  string error = 5;
}

message SubscribeRequest {
  string path = 1;
}

message ServerMessage {
  string type = 1;
  string payload = 2;
}

service AgentHub {
  rpc Register (RegisterRequest) returns (RegisterResponse);
  rpc Heartbeat (HeartbeatRequest) returns (HeartbeatResponse);
  rpc SendCommandResult (SendCommandResultRequest) returns (SendCommandResultResponse);
  rpc GetConnectionDetails (GetConnectionDetailsRequest) returns (GetConnectionDetailsResponse);
  rpc GetSasToken (GetSasTokenRequest) returns (GetSasTokenResponse);
  rpc Subscribe (SubscribeRequest) returns (stream ServerMessage);
}
